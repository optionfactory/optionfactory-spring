<!DOCTYPE html>
<html>
    <head data-th-replace="~{alert-layout.html :: head('#033540')}">
        <title>Alerts</title>
    </head>
    <body>
        <table id="alerts" data-th-replace="~{alert-layout.html :: alerts('Test title', ${alerts}, ~{this::#alerts/content()})}">
            <tr>
                <td class="data-label">Username</td>
                <td class="data-value">[[${principal.username}]]</td>
            </tr>
            <tr data-th-if="${principal.impersonator != null}" >
                <td colspan="2" class="section-heading-cell">
                    <p class="section-heading-text">Impersonator</p>
                </td>                                    
            </tr>
            <tr data-th-if="${principal.impersonator != null}" >
                <td class="data-label">Username</td>
                <td class="data-value">[[${principal.impersonator.username}]]</td>
            </tr>
        </table>
    </body>
</html>
