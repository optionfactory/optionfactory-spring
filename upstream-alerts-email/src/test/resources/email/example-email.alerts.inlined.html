<!DOCTYPE html>
<html>
    <head data-th-replace="~{alert-layout.html :: head('#033540')}">
        <title>Alerts</title>
    </head>
    <body>
        <table id="alerts" data-th-replace="~{alert-layout.html :: alerts('Test title', ${alerts}, ~{this::#alerts/content()})}">
            <tr>
                <td>Username</td>
                <td>[[${principal.username}]]</td>
            </tr>
            <tr data-th-if="${principal.impersonator != null}" >
                <th colspan="2" scope="rowgroup">
                    Impersonator
                </th>
            </tr>
            <tr data-th-if="${principal.impersonator != null}" >
                <td>Username</td>
                <td>[[${principal.impersonator.username}]]</td>
            </tr>
        </table>
    </body>
</html>
